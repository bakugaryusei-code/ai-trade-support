name: Daily AI Trade Batch

# JST 8:17 / 12:17 / 15:17 頃に実行（UTCでは -9 時間）
# 注意：GitHub Actions のスケジュールは「毎時00分」が世界中で最も混雑し、数時間遅延することがある。
#       17分など中途半端な時刻にズラすと遅延が30分以内に収まりやすい。
on:
  schedule:
    - cron: "17 23 * * *"  # UTC 23:17 ≈ JST 08:17
    - cron: "17 3 * * *"   # UTC 03:17 ≈ JST 12:17
    - cron: "17 6 * * *"   # UTC 06:17 ≈ JST 15:17
  workflow_dispatch:        # 手動実行も可能（テスト用）

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE: ${{ secrets.SUPABASE_SERVICE }}
        run: python scripts/run_batch.py
