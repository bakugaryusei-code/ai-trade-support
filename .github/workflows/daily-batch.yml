name: Daily AI Trade Batch

# トリガーは workflow_dispatch のみ。
# 定刻実行は cron-job.org（外部サービス、無料）が JST 8:00/12:00/15:00 に
# GitHub API（POST /actions/workflows/daily-batch.yml/dispatches）で叩く。
# GitHub Actions の内蔵 cron は数時間の遅延が発生するため使わない。
on:
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE: ${{ secrets.SUPABASE_SERVICE }}
        run: python scripts/run_batch.py
