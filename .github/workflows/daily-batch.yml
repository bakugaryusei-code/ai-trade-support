name: Daily AI Trade Batch

# JST 8:00 / 12:00 / 15:00 に実行（UTCでは -9 時間）
on:
  schedule:
    - cron: "0 23 * * *"   # UTC 23:00 = JST 08:00
    - cron: "0 3 * * *"    # UTC 03:00 = JST 12:00
    - cron: "0 6 * * *"    # UTC 06:00 = JST 15:00
  workflow_dispatch:        # 手動実行も可能（テスト用）

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE: ${{ secrets.SUPABASE_SERVICE }}
        run: python scripts/run_batch.py
